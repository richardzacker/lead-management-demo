<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raimak LMS — Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-authentication-library/2.38.3/msal-browser.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
/* ============================================================
   Raimak LMS v3.0 — Gamified Dark Theme
============================================================ */
@import url("https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap");
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0c1422;--card:#111d2e;--card-hover:#172338;
  --border:#1e2e48;--border-hi:#2a3d60;--glow-line:#1e3a6e;
  --navy:#0d1b3e;--blue:#1b4f8a;--blue-mid:#2563b0;--blue-bright:#3b82f6;
  --blue-glow:rgba(59,130,246,0.2);--blue-dim:rgba(37,99,176,0.15);
  --cyan:#00e5ff;--cyan-dim:rgba(0,212,255,0.1);--cyan-glow:rgba(0,212,255,0.25);
  --green:#00ff88;--green-dim:rgba(16,240,128,0.1);
  --red:#ff4757;--red-dim:rgba(255,71,87,0.12);
  --amber:#ffb300;--amber-dim:rgba(255,179,0,0.12);--purple:#b48fff;
  --text-1:#f0f6ff;--text-2:#7a98c8;--text-3:#3d5280;
  --radius-sm:6px;--radius:10px;--radius-lg:16px;
  --font-head:"Rajdhani",sans-serif;--font-body:"DM Sans",sans-serif;--font-mono:"IBM Plex Mono",monospace;
  --sidebar-w:240px;--transition:0.18s ease;
}
html,body{height:100%;background:var(--bg);color:var(--text-1);font-family:var(--font-body);font-size:14px;line-height:1.6;padding-top:24px}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9998}

/* Demo banner */
.demo-banner{position:fixed;top:24px;left:0;right:0;z-index:9995;background:linear-gradient(90deg,#1b4f8a,#2563b0,#1b4f8a);color:#fff;text-align:center;padding:6px 16px;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;border-bottom:1px solid var(--cyan)}

/* Login */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 70% 60% at 50% 100%,rgba(27,79,138,0.3) 0%,transparent 70%)}
.login-card{background:var(--card);border:1px solid var(--border-hi);border-radius:var(--radius-lg);padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 0 60px rgba(0,212,255,0.08),0 32px 64px rgba(0,0,0,0.6);animation:fadeUp 0.5s ease both;position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue-bright),transparent)}
.login-logo{display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.login-logo img{height:80px;width:auto;border-radius:8px}
.login-card h1{font-family:var(--font-head);font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-1)}
.login-card p{color:var(--text-2);margin-bottom:28px;font-size:14px}
.login-version{font-family:var(--font-mono);font-size:11px;color:var(--text-3);margin-top:20px;margin-bottom:0}
.btn-lg{width:100%;padding:14px 24px;font-size:15px;display:flex;align-items:center;justify-content:center}

/* App shell */
#app{height:100vh}
.app-shell{display:flex;width:100%;height:100vh;overflow:hidden}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;width:var(--sidebar-w);flex-shrink:0;z-index:100}
.sidebar-brand{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.sidebar-brand img{height:44px;width:auto;border-radius:6px}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--text-2);font-size:13.5px;font-weight:500;transition:all var(--transition);cursor:pointer;position:relative;letter-spacing:0.3px}
.nav-item:hover{background:var(--card);color:var(--text-1)}
.nav-item.active{background:var(--cyan-dim);color:var(--cyan);border:1px solid rgba(0,212,255,0.15)}
.nav-item.active::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--cyan);border-radius:2px;box-shadow:0 0 8px var(--cyan)}
.badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:var(--font-mono);display:none}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue-mid),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;font-size:15px;flex-shrink:0}
.user-meta{display:flex;flex-direction:column;min-width:0}
.user-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-1)}
.user-email{font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono)}
.main-content{flex:1;min-width:0;overflow-y:auto;background:#ffffff;position:relative;padding:28px 32px 40px;color:#1a2640}
.view-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}
.view-title{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--text-1);letter-spacing:1.5px;text-transform:uppercase;line-height:1.1}
.view-subtitle{font-family:var(--font-mono);font-size:11px;color:var(--cyan);display:block;margin-top:4px;letter-spacing:1px}
.header-actions{display:flex;gap:8px;align-items:center}

/* Buttons */
.btn-primary{background:linear-gradient(135deg,var(--blue-mid),var(--blue-bright));color:#fff;font-family:var(--font-head);font-weight:600;font-size:14px;letter-spacing:0.5px;padding:9px 20px;border-radius:var(--radius-sm);display:inline-flex;align-items:center;gap:6px;transition:all var(--transition);text-transform:uppercase;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--blue-glow),0 0 0 1px var(--blue-bright)}
.btn-cyan{background:transparent;color:var(--cyan);font-family:var(--font-head);font-weight:600;font-size:14px;letter-spacing:0.5px;padding:9px 20px;border-radius:var(--radius-sm);border:1px solid var(--cyan);display:inline-flex;align-items:center;gap:6px;transition:all var(--transition);text-transform:uppercase}
.btn-cyan:hover{background:var(--cyan-dim);box-shadow:0 0 16px var(--cyan-glow)}
.btn-ghost{background:transparent;color:var(--text-2);font-size:13px;font-weight:500;padding:9px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);display:inline-flex;align-items:center;gap:6px;transition:all var(--transition)}
.btn-ghost:hover{background:var(--card);color:var(--text-1);border-color:var(--border-hi)}
.btn-ghost-sm{background:transparent;color:var(--cyan);font-size:12px;font-weight:600;padding:4px 0;border:none;font-family:var(--font-mono);letter-spacing:0.5px;transition:opacity var(--transition)}
.btn-ghost-sm:hover{opacity:0.7}
.btn-icon{background:transparent;color:var(--text-3);padding:6px;border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;transition:all var(--transition);border:1px solid transparent}
.btn-icon:hover{background:var(--card);color:var(--text-1);border-color:var(--border)}
.btn-icon.btn-danger:hover{background:var(--red-dim);color:var(--red);border-color:var(--red)}
.btn-danger-ghost{color:var(--red)!important;border-color:rgba(255,71,87,0.3)!important}
.btn-danger-ghost:hover{background:var(--red-dim)!important;border-color:var(--red)!important}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;display:flex;flex-direction:column;gap:4px;transition:all var(--transition);position:relative;overflow:hidden}
.kpi-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.kpi-primary::before{background:linear-gradient(90deg,var(--blue-bright),var(--cyan))}
.kpi-success::before{background:linear-gradient(90deg,var(--green),#00ff88)}
.kpi-warn::before{background:linear-gradient(90deg,var(--amber),#ffd700)}
.kpi-info::before{background:linear-gradient(90deg,var(--purple),#d4b8ff)}
.kpi-neutral::before{background:var(--border-hi)}
.kpi-card:hover{background:var(--card-hover);border-color:var(--border-hi);transform:translateY(-2px)}
.kpi-label{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px}
.kpi-value{font-family:var(--font-head);font-size:44px;font-weight:700;color:var(--text-1);line-height:1;margin:6px 0 2px;letter-spacing:-1px}
.kpi-sub{font-size:11px;color:var(--text-3);font-family:var(--font-mono)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text-1);text-transform:uppercase;letter-spacing:0.8px}
.card-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

/* Status */
.status-breakdown{padding:12px 20px 16px}
.status-row{display:flex;align-items:center;gap:12px;padding:7px 0}
.status-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.status-bar{height:100%;background:linear-gradient(90deg,var(--blue-mid),var(--cyan));border-radius:2px;transition:width 0.6s ease;min-width:2px}
.status-count{font-family:var(--font-mono);font-size:12px;color:var(--text-2);width:28px;text-align:right}
.status-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--font-mono);white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase}
.status-new{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.35)}
.status-1st-contact,.status-2nd-contact,.status-3rd-contact,.status-pending-order{background:rgba(255,200,0,0.15);color:#ffd700;border:1px solid rgba(255,200,0,0.35)}
.status-do-not-call,.status-fnq,.status-already-has-fiber{background:rgba(255,50,50,0.18);color:#ff4444;border:1px solid rgba(255,50,50,0.4)}
.status-sold{background:rgba(16,240,128,0.15);color:#10f080;border:1px solid rgba(16,240,128,0.4);box-shadow:0 0 8px rgba(16,240,128,0.2)}
.status-tdm{background:rgba(0,212,255,0.12);color:var(--cyan);border:1px solid rgba(0,212,255,0.35)}
.lead-type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase}
.lead-type-frontier{background:rgba(59,130,246,0.15);color:var(--blue-bright);border:1px solid rgba(59,130,246,0.25)}
.lead-type-kinetic{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.2)}
.lead-type-vz-mobile{background:rgba(180,143,255,0.15);color:var(--purple);border:1px solid rgba(180,143,255,0.25)}

/* Tables */
.table-wrap{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:1.2px;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:rgba(0,0,0,0.2)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-1)}
.data-table tbody tr:last-child td{border-bottom:none}
.lead-row{cursor:pointer;transition:background var(--transition)}
.lead-row:hover td{background:var(--card-hover)}
.lead-row.row-warn td{background:rgba(255,179,0,0.03)}
.lead-name{font-weight:600;display:block;font-size:13.5px}
.td-mono{font-family:var(--font-mono);font-size:12px;color:var(--text-2);white-space:nowrap}
.td-flags{display:flex;gap:4px;flex-wrap:wrap}
.td-actions{display:flex;gap:4px}
.flag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--font-mono);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.flag-cool_off{background:var(--blue-dim);color:var(--blue-bright)}
.flag-needs_recycle{background:var(--amber-dim);color:var(--amber)}

/* Filters */
.filters-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px 9px 38px;color:var(--text-1);font-size:13.5px;transition:all var(--transition)}
.search-input:focus,.filter-select:focus,.form-input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-dim)}
.filter-select{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;color:var(--text-1);font-size:13.5px;min-width:160px;cursor:pointer}

/* Alerts */
.alert{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius-sm);font-size:13.5px;margin-bottom:20px}
.alert-info{background:var(--cyan-dim);border:1px solid rgba(0,212,255,0.2);color:var(--cyan)}
.alert-warn{background:var(--amber-dim);border:1px solid rgba(255,179,0,0.25);color:var(--amber)}

/* Contractors */
.contractor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.contractor-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all var(--transition)}
.contractor-card:hover{border-color:var(--border-hi);background:var(--card-hover);transform:translateY(-2px)}
.contractor-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.contractor-avatar{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-mid));color:white;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-weight:700;font-size:20px;flex-shrink:0}
.contractor-name{font-weight:700;font-size:14px;color:var(--text-1);font-family:var(--font-head);text-transform:uppercase;letter-spacing:0.5px}
.contractor-role{font-family:var(--font-mono);font-size:11px;color:var(--text-3);margin-top:2px}
.contractor-email{font-family:var(--font-mono);font-size:12px;color:var(--text-3);margin-bottom:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.load-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.load-bar{height:100%;background:linear-gradient(90deg,var(--blue-mid),var(--cyan));border-radius:2px;transition:width 0.6s ease;min-width:2px}
.load-bar.load-high{background:linear-gradient(90deg,var(--amber),#ffd700)}
.load-bar.load-full{background:linear-gradient(90deg,var(--red),#ff6b6b);box-shadow:0 0 8px rgba(255,71,87,0.4)}
.load-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-2);margin-bottom:6px;font-family:var(--font-mono)}
.status-dot{width:8px;height:8px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dot-active{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.dot-inactive{background:var(--text-3)}
.action-badge{font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:4px;background:var(--border);color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--card);border:1px solid var(--border-hi);border-radius:var(--radius-lg);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 0 40px rgba(0,212,255,0.08),0 32px 80px rgba(0,0,0,0.7);animation:fadeUp 0.2s ease both;position:relative}
.modal::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue-bright),transparent)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-family:var(--font-head);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.modal-form{padding:20px 24px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group-full{margin-bottom:16px}
.form-section-title{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:2px;padding:12px 0 8px;border-top:1px solid var(--border);margin-top:4px}
.form-group label{font-family:var(--font-mono);font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text-1);font-size:13.5px;transition:all var(--transition);width:100%}
.form-input option{background:var(--surface)}
.form-textarea{resize:vertical;min-height:80px}

/* Toast */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border-hi);border-radius:var(--radius);padding:12px 18px;font-size:13.5px;color:var(--text-1);box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;transform:translateY(12px) translateX(20px);transition:all 0.25s ease;max-width:320px;font-family:var(--font-mono)}
.toast.show{opacity:1;transform:translateY(0) translateX(0)}
.toast-success{border-color:var(--green);color:var(--green);background:rgba(16,240,128,0.05)}
.toast-error{border-color:var(--red);color:var(--red);background:rgba(255,71,87,0.05)}
.toast-info{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}

/* Loading */
.loading-overlay{position:absolute;inset:0;background:rgba(6,11,20,0.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--cyan);border-right-color:var(--blue-bright);border-radius:50%;animation:spin 0.7s linear infinite}
.empty-state{text-align:center;color:var(--text-3);padding:40px 20px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.5px}
.text-danger{color:var(--red)!important}

/* Live sales feed */
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:8px;animation:pulse 1.5s infinite;box-shadow:0 0 8px var(--green)}
.sales-feed{padding:4px 0;max-height:220px;overflow-y:auto}
.sale-entry{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);transition:background var(--transition);animation:slideIn 0.4s ease both}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.sale-entry:hover{background:var(--card-hover)}
.sale-icon{font-size:18px}
.sale-info{flex:1}
.sale-name{font-weight:600;font-size:13.5px;color:var(--text-1);display:block}
.sale-agent{font-family:var(--font-mono);font-size:11px;color:var(--cyan)}
.sale-time{font-family:var(--font-mono);font-size:11px;color:var(--text-3);white-space:nowrap}

/* Top 5 */
.top5-list{padding:8px 0 12px}
.top5-row{display:flex;align-items:center;gap:12px;padding:9px 20px;border-bottom:1px solid var(--border);transition:background var(--transition)}
.top5-row:last-child{border-bottom:none}

  async function recycleLead(leadId, currentAgent) {
    await _delay(150);
    const lead = _leads.find(l=>l.id===leadId);
    if (!lead) return;
    const prev = lead.previousAgents||"";
    lead.previousAgents = prev ? prev+", "+currentAgent : currentAgent;
    lead.status = "New"; lead.assignedTo = ""; lead.lastContacted = null;
  }

  function applyBusinessRules(leads, contractors) {
    const now = new Date();
    const { coolOffDays, maxLeadsPerAgent, recycleAfterDays } = Config.rules;
    const agentCounts = {};
    leads.forEach(l=>{ if(l.assignedTo && !Config.terminalStatuses.includes(l.status)) agentCounts[l.assignedTo]=(agentCounts[l.assignedTo]||0)+1; });
    return leads.map(lead=>{
      const flags=[];
      if (lead.lastContacted) {
        const daysSince=(now-new Date(lead.lastContacted))/86400000;
        if (daysSince<coolOffDays && !Config.terminalStatuses.includes(lead.status)) flags.push("cool_off");
        if (lead.status==="3rd Contact" && daysSince>=coolOffDays) flags.push("needs_recycle");
      }
      const ref=lead.lastContacted||lead.createdAt;
      if (ref && !Config.terminalStatuses.includes(lead.status) && lead.status!=="3rd Contact") {
        if ((now-new Date(ref))/86400000>recycleAfterDays) flags.push("needs_recycle");
      }
      if (lead.assignedTo && agentCounts[lead.assignedTo]>maxLeadsPerAgent) flags.push("agent_overloaded");
      return Object.assign({},lead,{ flags, agentLeadCount:agentCounts[lead.assignedTo]||0 });
    });
  }

  function canAgentTakeLead(agentName, leads) {
    return leads.filter(l=>l.assignedTo===agentName && !Config.terminalStatuses.includes(l.status)).length < Config.rules.maxLeadsPerAgent;
  }

  function isInCoolOff(lead) {
    if (!lead.lastContacted) return false;
    return (new Date()-new Date(lead.lastContacted))/86400000 < Config.rules.coolOffDays;
  }

    const uniqueLeads = new Set();
    activityLog.forEach(e=>{
      const entryAgent = (e.agent||"").toLowerCase().trim();

      if (isContact && entryAgent===emailLower && e.timestamp && new Date(e.timestamp).toDateString()===todayStr && e.leadId) uniqueLeads.add(e.leadId);
    });
    return uniqueLeads.size;
  }

  function _delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

  return { getLeads, addLead, updateLead, deleteLead, assignAgent, recycleLead, getNextLeadForAgent:async()=>null, getContractors, getActivityLog, logActivity, getTodaySales, getDailyStats, applyBusinessRules, canAgentTakeLead, isInCoolOff, agentContactsToday };
})();

// ============================================================
function navigate(view) {
  const adminOnly = ["leads","drip","assign","report","contractors","activity"];
  if (!isAdmin() && adminOnly.includes(view)) view = "myleads";
  State.currentView = view;
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  const navEl = document.querySelector("[data-view='"+view+"']");
  if (navEl) navEl.classList.add("active");
  switch(view) {
    case "dashboard":   renderDashboard();   break;
    case "leads":       renderLeads();       break;
    case "myleads":     renderMyLeads();     break;
    case "drip":        renderDripFeed();    break;
    case "assign":      renderAssignLeads(); break;
    case "contractors": renderContractors(); break;
    case "activity":    renderActivity();    break;
    case "report":      renderDailyReport(); break;
  }
}

async function recycleLeadAction(leadId, currentAgent, leadName) {
  if (!confirm("Recycle \""+leadName+"\"? This will reset status to New and unassign the lead.")) return;
  setLoading(true);
  try {
    await Graph.recycleLead(leadId, currentAgent);
    await Graph.logActivity({ LeadID:leadId, Title:leadName, ActionType:"Recycled", AgentEmail:(State.currentUser&&State.currentUser.email)||"", Notes:"Recycled — previous agent: "+(currentAgent||"unknown") });
    UI.showToast(leadName+" recycled!","success");
    await loadAllData(); renderDashboard();
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

async function recycleAllLeads() {
  const rl = State.leads.filter(l=>l.flags&&l.flags.includes("needs_recycle"));
  if (!rl.length) { UI.showToast("No leads to recycle.","info"); return; }
  if (!confirm("Recycle ALL "+rl.length+" leads? This cannot be undone.")) return;
  setLoading(true);
  try {
    for (const lead of rl) {
      await Graph.recycleLead(lead.id, lead.assignedTo||"");
      await Graph.logActivity({ LeadID:lead.id, Title:lead.name, ActionType:"Recycled", AgentEmail:(State.currentUser&&State.currentUser.email)||"", Notes:"Bulk recycled" });
    }
    UI.showToast("Recycled "+rl.length+" leads!","success");
    await loadAllData(); renderDashboard();
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

function renderDripFeed() {
  if (!isAdmin()) { navigate("myleads"); return; }
  const allUnassigned = State.leads.filter(l=>!l.assignedTo&&!Config.terminalStatuses.includes(l.status));
  const unassigned    = filterLeadsByCallingHours(allUnassigned);
  const hiddenCount   = allUnassigned.length - unassigned.length;
  if (!State.dripLead&&unassigned.length) State.dripLead=unassigned[0];
  if (State.dripLead&&!isWithinCallingHours(State.dripLead)) State.dripLead=unassigned.length?unassigned[0]:null;
  const lead=State.dripLead;

  document.getElementById("main-content").innerHTML = `
    <div class="view-header"><div><h1 class="view-title">Drip Feed</h1><span class="view-subtitle">// ASSIGN ONE LEAD AT A TIME · ${unassigned.length} available</span></div><button class="btn-ghost" onclick="skipDripLead()">Skip This Lead</button></div>
    ${hiddenCount>0?`<div class="alert alert-info">⏰ ${hiddenCount} lead${hiddenCount!==1?"s are":" is"} outside calling hours (8am–8pm local time) and will appear when available.</div>`:""}
    ${!lead?`<div class="drip-card"><div style="text-align:center;padding:40px 0"><div style="font-size:52px;margin-bottom:16px">✓</div><h3 style="font-family:var(--font-head);font-size:24px;text-transform:uppercase;letter-spacing:1px;color:var(--green)">All Leads Assigned!</h3><p style="color:var(--text-2);margin-top:8px">No unassigned leads available right now.</p></div></div>`:`
    <div class="drip-card">
      <div class="drip-header"><span class="drip-title">Next Lead</span><div style="display:flex;gap:8px">${lead.leadType?`<span class="lead-type-badge lead-type-${(lead.leadType||"").toLowerCase()}">${escHtml(lead.leadType)}</span>`:""}<span class="status-badge status-${lead.status.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"")}">${lead.status}</span></div></div>
      <div class="drip-lead-name">${escHtml(lead.name)}</div>
      <div class="drip-meta">
        ${lead.phone?`<span class="feed-meta">📞 ${escHtml(lead.phone)}</span>`:""}
        ${lead.state?`<span class="feed-meta">⏰ ${getCurrentTimeInTimezone(getLeadTimezone(lead)||"America/Chicago")} local</span>`:""}
      </div>
      <div style="margin-top:8px"><span class="feed-label">Assign To Agent</span>
        <div style="display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap">

          <button class="btn-primary" onclick="confirmDripAssign('${lead.id}')">Assign &amp; Next</button>
          <button class="btn-ghost" onclick="skipDripLead()">Skip</button>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-header"><h2 class="card-title">Available Unassigned (${unassigned.length})</h2></div>${renderLeadsTable(unassigned.slice(0,10),true)}</div>`}
  `;
}

async function confirmDripAssign(leadId) {
  const agent = (document.getElementById("drip-agent-select")||{}).value;
  if (!agent) { UI.showToast("Please select an agent first.","error"); return; }
  const lead = State.leads.find(l=>l.id===leadId);
  setLoading(true);
  try {
    await Graph.assignAgent(leadId, agent);
    await Graph.logActivity({ LeadID:leadId, Title:lead?lead.name:"", ActionType:"Drip Assigned", AgentEmail:agent, Notes:"Drip-assigned by "+((State.currentUser&&State.currentUser.name)||"Admin") });
    UI.showToast(lead.name+" assigned to "+agent,"success");
    await loadAllData();
    const remaining = filterLeadsByCallingHours(State.leads.filter(l=>!l.assignedTo&&!Config.terminalStatuses.includes(l.status)));
    State.dripLead = remaining.length?remaining[0]:null;
    renderDripFeed();
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

function skipDripLead() {
  const unassigned = filterLeadsByCallingHours(State.leads.filter(l=>!l.assignedTo&&!Config.terminalStatuses.includes(l.status)));
  const idx = unassigned.findIndex(l=>State.dripLead&&l.id===State.dripLead.id);
  State.dripLead = unassigned[(idx+1)%unassigned.length]||null;
  renderDripFeed();
}

function searchMyLeads(q) {
  const leads=(State.leads||[]).filter(l=>!Config.terminalStatuses.includes(l.status));
  const filtered=!q.trim()?[]:leads.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())||(l.phone||"").includes(q)||(l.address||"").toLowerCase().includes(q.toLowerCase()));
  const wrap=document.getElementById("my-leads-table");
  if (!wrap) return;
  if (!q.trim()) { wrap.innerHTML=""; return; }
  wrap.innerHTML=filtered.length?renderLeadsTable(filtered,false,true):`<div class="empty-state">No leads found for "${escHtml(q)}"</div>`;

}

  document.querySelectorAll(".status-btn").forEach(btn=>{ btn.style.borderColor=""; btn.style.color=""; btn.style.background=""; btn.style.boxShadow=""; });
  const btn=document.getElementById("sbtn-"+newStatus.replace(/\s+/g,"-"));
  if(btn){ btn.style.borderColor="var(--cyan)"; btn.style.color="var(--cyan)"; btn.style.background="var(--cyan-dim)"; btn.style.boxShadow="0 0 12px var(--cyan-glow)"; }
  const notice=document.getElementById("feed-staged-notice");
  if(notice){ notice.style.display="block"; notice.textContent="⚡ \""+newStatus+"\" staged — click Save to confirm"; }
  const badge=document.getElementById("feed-current-status");
  if(badge){ badge.textContent=newStatus+" (staged)"; badge.style.opacity="0.7"; }
}

async function agentSaveAll(leadId) {
  const user=State.currentUser;
  const lead=State.leads.find(l=>l.id===leadId);
  if (!lead) return;
  const newStatus=_stagedStatus||lead.status;
  const mrc=(document.getElementById("feed-mrc")||{}).value||"";
  const products=(document.getElementById("feed-products")||{}).value||"";
  const newNote=(document.getElementById("feed-notes")||{}).value||"";
  const cbr=(document.getElementById("feed-cbr")||{}).value||"";
  const btn=(document.getElementById("feed-btn")||{}).value||"";
  const autoPayEl=document.querySelector('input[name="feed-autopay"]:checked');
  const autoPay=autoPayEl?autoPayEl.value:"";
  const soldByEl=document.getElementById("feed-sold-by");
  const soldByName=soldByEl?soldByEl.value:"";
  if (!autoPay) { UI.showToast("Please select an AutoPay option before saving.","error"); return; }
  if (newStatus===Config.soldStatus&&!soldByName) { UI.showToast("Please select who made this sale in the Sold By field.","error"); return; }
  const soldByContractor=soldByName?State.contractors.find(c=>c.name===soldByName):null;
  const soldByEmail=soldByContractor?(soldByContractor.email||soldByName):((user&&user.email)||"");
  const activityEmail=newStatus===Config.soldStatus?soldByEmail:((user&&user.email)||"");
  let notes=lead.notes||"";
  if (newNote.trim()) {
    const today=new Date();
    const dateStamp=(today.getMonth()+1).toString().padStart(2,"0")+"/"+today.getDate().toString().padStart(2,"0")+"/"+String(today.getFullYear()).slice(-2);
    const agentTag=(user&&user.name)?" - "+user.name:"";
    const stamped="["+dateStamp+agentTag+"] "+newNote.trim();
    notes=notes?stamped+"\n"+notes:stamped;
  }
  setLoading(true);
  try {
    const todayStr=new Date().toISOString().split("T")[0];
    const saveFields={ Status:newStatus, LastTouchedOn:todayStr };
    if(mrc) saveFields["MonthlyRecurringCharge_x0028_MRC"]=mrc;
    if(products) saveFields["CurrentProducts"]=products;
    if(cbr) saveFields["CBR"]=cbr;
    if(btn) saveFields["BTN"]=btn;
    if(notes) saveFields["Notes"]=notes;
    if(autoPay) saveFields["AutoPay"]=autoPay;
    await Graph.updateLead(leadId, saveFields);
    if (newStatus===Config.soldStatus&&soldByName&&soldByName!==(user&&user.name)) await Graph.assignAgent(leadId, soldByName);
    if (newStatus==="TDM") { await Graph.assignAgent(leadId,""); UI.showToast("TDM — lead returned to admin queue.","info"); }
    await Graph.logActivity({ LeadID:leadId, Title:lead.name, ActionType:"Status: "+newStatus, AgentEmail:activityEmail, Notes:notes });
    if (newStatus===Config.soldStatus) {
      UI.showConfetti();
      const savingAgentName=(user&&user.name)||"";
      const savingContractor=State.contractors.find(c=>(c.email||"").toLowerCase()===((user&&user.email)||"").toLowerCase());
      const savingDisplayName=(savingContractor&&savingContractor.name)||savingAgentName;
      if (soldByName&&savingDisplayName&&soldByName!==savingDisplayName) {
        UI.showSaleBanner(lead.name, savingDisplayName, soldByName);
      } else {
        UI.showSaleBanner(lead.name, soldByName||savingDisplayName, null);
      }
    } else if (newStatus!=="TDM") {
      UI.showToast("Saved!","success");
    }
    _stagedStatus=null; _leadSaved=true;
    await loadAllData();
    const nextRow=document.getElementById("feed-next-row");
    const saveBtn=document.getElementById("feed-save-btn");
    if(nextRow) nextRow.style.display="block";
    if(saveBtn){ saveBtn.textContent="Saved ✓"; saveBtn.disabled=true; saveBtn.style.background="var(--green)"; saveBtn.style.color="#0D1B3E"; saveBtn.style.fontWeight="700"; }
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

async function assignLead(leadId) {
  const select=document.getElementById("assign-"+leadId);

  try {
    const newLead=await Graph.addLead(fields);
    if(agentName) await Graph.assignAgent(newLead.id, agentName);
    await Graph.logActivity({ LeadID:newLead.id, Title:(fields.FirstName+" "+fields.LastName).trim(), ActionType:"Lead Created", AgentEmail:(State.currentUser&&State.currentUser.email)||"" });
    await refreshData(); closeModal(); UI.showToast("Lead added!","success");
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

async function submitEditLead() {
  const fields=collectLeadForm(); if(!fields) return;
  const agentName=fields._agentName; delete fields._agentName;
  setLoading(true);
  try {
    await Graph.updateLead(State.editingLeadId, fields);
    if(agentName) await Graph.assignAgent(State.editingLeadId, agentName);
    await refreshData(); closeModal(); UI.showToast("Lead updated!","success");
  } catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

function collectLeadForm() {
  const firstName=((document.getElementById("f-firstname")||{}).value||"").trim();
  const lastName=((document.getElementById("f-lastname")||{}).value||"").trim();
  if(!firstName&&!lastName){ UI.showToast("Name is required.","error"); return null; }
  const agentName=(document.getElementById("f-assigned")||{}).value||"";
  const fields={ _agentName:agentName, FirstName:firstName, LastName:lastName };
  const add=(key,elId,trim)=>{ const el=document.getElementById(elId); const val=el?(trim?(el.value||"").trim():(el.value||"")):null; if(val) fields[key]=val; };
  add("Lead_x0020_Type","f-leadtype"); add("Email","f-email",true); add("Phone","f-phone",true);
  add("Status","f-status"); add("MonthlyRecurringCharge_x0028_MRC","f-mrc",true);
  add("CurrentProducts","f-products"); add("WorkAddress","f-address",true);
  add("WorkCity","f-city",true); add("State","f-state",true); add("Zip","f-zip",true);
  const notesEl=document.getElementById("f-notes");
  if(notesEl&&notesEl.value.trim()){
    const today=new Date();
    const dateStamp=(today.getMonth()+1).toString().padStart(2,"0")+"/"+today.getDate().toString().padStart(2,"0")+"/"+String(today.getFullYear()).slice(-2);
    const adminName=(State.currentUser&&State.currentUser.name)?" - "+State.currentUser.name:"";
    fields["Notes"]="["+dateStamp+adminName+"] "+notesEl.value.trim();
  }
  if(!fields.Status) fields.Status="New";
  return fields;
}

async function deleteLead(id) {
  const lead=State.leads.find(l=>l.id===id);
  if(!confirm("Delete \""+((lead&&lead.name))+'"? This cannot be undone.')) return;
  setLoading(true);
  try { await Graph.deleteLead(id); await refreshData(); UI.showToast("Lead deleted.","success"); }
  catch(err) { UI.showToast("Failed: "+err.message,"error"); }
  finally { setLoading(false); }
}

function closeModal(event) {
  if(event&&event.target!==document.getElementById("modal-overlay")) return;
  document.getElementById("modal-overlay").style.display="none";
}

// ============================================================
//  UTILITIES
// ============================================================
async function refreshData() { await loadAllData(); navigate(State.currentView); }
function setLoading(on) { State.loading=on; const o=document.getElementById("loading-overlay"); if(o) o.style.display=on?"flex":"none"; }
function updateBadges() { const n=State.leads.filter(l=>l.flags&&(l.flags.includes("needs_recycle")||l.flags.includes("agent_overloaded"))).length; const b=document.getElementById("badge-leads"); if(b){ b.textContent=n>0?n:""; b.style.display=n>0?"inline-flex":"none"; } }
function exportCSV() { UI.showToast("Export disabled in demo mode.","info"); }
function formatDate(d) { if(!d) return ""; return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function formatTime(d) { if(!d) return ""; return new Date(d).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }
function formatDateTime(d) { if(!d) return ""; return new Date(d).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function escHtml(str) { return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function flagLabel(f) { return {cool_off:"Cool-off",needs_recycle:"Recycle",agent_overloaded:"Overloaded"}[f]||f; }

const UI = {
  showToast: function(msg,type) {
    type=type||"info";
    const c=document.getElementById("toast-container");
    if(!c) return;
    const t=document.createElement("div");
    t.className="toast toast-"+type; t.textContent=msg;
    c.appendChild(t);
    setTimeout(()=>t.classList.add("show"),10);
    setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(),300); },4000);
  },
  showConfetti: function() {
    const el=document.createElement("div");
    el.className="confetti-burst"; el.innerHTML="🎉 SOLD! 🎉";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  },
  showSaleBanner: function(leadName, soldBy, forAgent) {
    const existing=document.getElementById("sale-banner");
    if(existing) existing.remove();
    const banner=document.createElement("div");
    banner.id="sale-banner";
    const message=forAgent
      ? `<strong>${escHtml(soldBy)}</strong> just made a sale for <strong>${escHtml(forAgent)}</strong> — <strong>${escHtml(leadName)}</strong> 🎯`
      : `<strong>${escHtml(soldBy||"Someone")}</strong> just closed a sale! — <strong>${escHtml(leadName)}</strong>`;
    banner.innerHTML=`<div style="display:flex;align-items:center;gap:16px;justify-content:center;flex:1"><span style="font-size:20px">🎉</span><span>${message}</span><span style="font-size:20px">🎉</span></div><button onclick="document.getElementById('sale-banner').remove()" style="background:transparent;border:1px solid rgba(255,255,255,0.3);color:white;padding:4px 12px;border-radius:4px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;flex-shrink:0">Dismiss</button>`;
    banner.style.cssText="position:fixed;top:24px;left:0;right:0;z-index:9997;background:linear-gradient(90deg,#0D1B3E,#1B4F8A,#0D1B3E);color:#FFFFFF;padding:12px 24px;display:flex;align-items:center;gap:16px;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;letter-spacing:1px;border-bottom:3px solid #00FF88;box-shadow:0 4px 24px rgba(0,255,136,0.3);animation:bannerSlide 0.4s ease both;";
    document.body.appendChild(banner);
    setTimeout(()=>{ if(document.getElementById("sale-banner")) document.getElementById("sale-banner").remove(); },8000);
  },
};
</script>
